<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WorkWell Alert – Worker Health Monitor</title>

<style>
body{
margin:0;
font-family:Segoe UI,Arial;
background:linear-gradient(120deg,#e0f2fe,#fef9c3);
}

header{
background:white;
padding:15px 30px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.container{
padding:30px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.stat-card{
background:white;
border-radius:10px;
padding:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.safe{color:#16a34a;}
.danger{color:#dc2626;}

.alert-banner{
display:none;
background:#dc2626;
color:white;
padding:15px;
border-radius:8px;
margin-bottom:20px;
font-weight:bold;
}

.workers{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.worker-card{
border-left:6px solid #16a34a;
padding:15px;
margin-bottom:15px;
border-radius:6px;
background:#f9fafb;
}

.worker-card.danger{
border-left-color:#dc2626;
background:#fff5f5;
}

footer{
text-align:center;
font-size:13px;
color:#666;
margin:20px 0;
}
</style>
</head>

<body>

<header>
<h1>Worker Health Monitor</h1>
<div>Real-time AI Safety Monitoring</div>
</header>

<div class="container">

<div class="alert-banner" id="alertBanner">
🚨 DANGER DETECTED!
</div>

<div class="stats">
<div class="stat-card">
<h2 id="totalWorkers">0</h2>
<p>Total Workers</p>
</div>

<div class="stat-card">
<h2 class="safe" id="safeCount">0</h2>
<p>Safe</p>
</div>

<div class="stat-card">
<h2 class="danger" id="dangerCount">0</h2>
<p>Danger</p>
</div>
</div>

<div class="workers" id="workers">
No workers registered yet.
</div>

</div>

<footer>
AI Smart Helmet Monitoring System
</footer>

<audio id="alarmSound">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

let alertedWorkers = {};

async function loadData(){

const res = await fetch("https://smarthelmet.onrender.com/dashboard");
const data = await res.json();

let safe = 0;
let danger = 0;
let html = "";
let showBanner = false;

for(let id in data.workers){

const w = data.workers[id];
const isDanger = w.status === "BAD";

if(isDanger) danger++;
else safe++;

html += `
<div class="worker-card ${isDanger ? "danger":""}">
<b>Worker:</b> ${id}<br>
Status: ${w.status}<br>
Temp: ${w.temperature} °C<br>
Heartbeat: ${w.heartbeat} BPM<br>
MQ7 Gas: ${w.mq7}<br>
MQ2 Gas: ${w.mq2}<br>
Fall: ${w.fall}
</div>
`;

if(isDanger && !alertedWorkers[id]){
document.getElementById("alarmSound").play();
alertedWorkers[id] = true;
}

if(!isDanger){
alertedWorkers[id] = false;
}

if(isDanger) showBanner = true;

}

document.getElementById("workers").innerHTML = html || "No workers detected";
document.getElementById("totalWorkers").innerText = data.worker_count;
document.getElementById("safeCount").innerText = safe;
document.getElementById("dangerCount").innerText = danger;

document.getElementById("alertBanner").style.display =
showBanner ? "block" : "none";

}

setInterval(loadData,3000);

</script>

</body>
</html>
